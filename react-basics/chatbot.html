<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style> 
    body{
      font-family :'Lucida Sans' ;
      margin-top : 0px;
      margin-bottom : 0px;
    }
    .send-button {
      background-color: rgb(25, 135, 84);
      color : white;
      padding : 12px 20px;
      margin :  0 10px ;
      border: none;
      border-radius : 10px;
      font-size : 15px;
      cursor : pointer;
    }
    .chat-input{
      padding : 12px 15px; 
      border-radius : 10px; 
      border-width : 1px;
      font-size : 15px; 
      flex-grow : 1; 
    }
    .input-container{
      display : flex;  
      margin-bottom : 40px ; 
    }
    .app-container{
      height : 100vh;
      max-width : 600px; 
      margin : auto ;
      display : flex;
      flex-direction : column;
    }
    .chat-message-user{
      display : flex;
      justify-content : end;
      align-items: start;
    }
    .chat-message-robot{
      display : flex;
      justify-content : start;
      align-items: start;
    }
    .chat-messages{ 
      background-color: rgb(238, 238, 238);
      padding : 15px 20px;
      border-radius : 10px;
      margin-right : 10px;
      margin-left : 10px;
      margin-bottom : 20px;
      max-width : 300px;
    }
    .chat-message-profile{
      width : 45px;
    }
    .chat-messages-container{
      margin-top : 20px;
      flex-grow : 1;
      overflow : scroll;
      scrollbar-width: none;
    }
    .welcome-message{
      color : rgb(120, 120, 120);
      text-align: center;
    }
    .loading-spinner{
      height : 40px;
      margin : -15px;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script> 
</head>
<body>
  <div class="js-container"></div>
  
  <script src="https://unpkg.com/supersimpledev/chatbot.js" ></script>

  <script type="text/babel">
    
    // <></> is a fragment to eliminate multiple nested divs

    // conponents
    function ChatInput({chatMessages, setChatMessages}) {
      const [inputText, setInputText] = React.useState(''); 
      const [isLoading, setIsLoading] = React.useState(false);
      function saveInput(event){
        setInputText(event.target.value);
      }
      async function sendMessage(){
        if(isLoading || inputText === ''){
          return;
        }
        setIsLoading(true);

        setInputText('');

        const newChatMessages = [
          ...chatMessages,
          {
            message : inputText,
            sender : 'user',
            id : crypto.randomUUID()
          }
        ];
        setChatMessages([
          ...newChatMessages,
          {
            message : <img src="loading-spinner.gif" className="loading-spinner" />,
            sender : 'robot',
            id : crypto.randomUUID()
        }]);

        const response = await Chatbot.getResponseAsync(inputText);
        setChatMessages([
          ...newChatMessages,
          {
            message : response,
            sender : 'robot',
            id : crypto.randomUUID()
          }
        ]);
        
        setIsLoading(false);
      }
      function handleKeyDown(event){
        if(event.key === 'Enter'){
          sendMessage();
        }
        else if(event.key === 'Escape'){
          setInputText('');
        }
      }
      return ( 
          <div className="input-container">
            <input 
              className="chat-input"
              placeholder="Send a message" 
              size="30" 
              onChange={saveInput}
              onKeyDown={handleKeyDown}
              value={inputText}
            />
            <button 
              className="send-button"
              onClick={sendMessage} 
            >Send</button>
          </div>
      ); 
    }

    function ChatMessage({message, sender}){
      // const message = props.message;
      // const sender = props.sender;
      // const {message, sender} = props;
      /*
      if (sender === 'user') {
        return (
          <div>
            {message}
            <img src="user.png" width="45" />
          </div>
        );
      }
      */

      return (
        <div className=
          {sender === 'user' ? 'chat-message-user' : 'chat-message-robot'}
        >
          {sender === 'robot' && <img src="robot.png" className="chat-message-profile" />}
          <div className="chat-messages">
            {message}
          </div>
          {sender === 'user' && <img src='user.png' className="chat-message-profile" />}
        </div>
      ); 
    } 
    function useAutoScroll(dependencies){
      const containerRef = React.useRef(null);
      React.useEffect(() => {
        const containerEle = containerRef.current;
        if(containerEle){
          containerEle.scrollTop = containerEle.scrollHeight;
        }
      },[dependencies]);
      return containerRef;
    }
    function ChatMessages({chatMessages}) {
      const chatMessagesRef =  useAutoScroll([chatMessages]);
      return (
        <div 
          className="chat-messages-container"
          ref={chatMessagesRef}
        >
          {chatMessages.map((chatMessage) => {
            return (
              <ChatMessage 
                message = {chatMessage.message}
                sender = {chatMessage.sender}
                key={chatMessage.id}
              />
            );
          })}
        </div> 
      );
    }

    function App() {
      const [chatMessages, setChatMessages] = React.useState([]);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages = array[0];
      // const setChatMessages = array[1];

      return (
        <div className="app-container"> 
          {chatMessages.length === 0 && (
            <p className="welcome-message">Welcome to the chatbot</p>
          )}
          <ChatMessages 
            chatMessages = {chatMessages}
          />
          <ChatInput 
            chatMessages = {chatMessages}
            setChatMessages = {setChatMessages}
          />
        </div>
      );
    } 

    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
