<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic React Boilerplate</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script> 
</head>
<body>
  <div class="js-container"></div>

  <script type="text/babel">
    function ProductDetails({product, price, discount}){
      return (
        <>
          <p>{product}</p>
          {
            discount ? (
              <>
                <p><del>Price : ${price}</del></p>
                <p>Discount : ${discount}</p>
              </>
            ) : (
              <p>price : ${price}</p>
            )
          }
          <button>Add to Cart</button>
        </>
      );
    }
    function App() {
      return (
        <>
          <ProductDetails product="Tennis ball" price="6.00" discount="3.00" />
          <ProductDetails product="Plain T-Shirt" price="7.99" />
        </>
      );
    }

    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);         
    root.render(<App />);    
  </script>
</body>
</html>
